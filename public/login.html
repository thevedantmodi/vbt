<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VBT — Login</title>
  <style>
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #F4F2EC;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 40px 36px;
      width: 320px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
    }
    h1 { font-size: 17px; font-weight: 700; margin: 0 0 4px; color: #111; }
    p  { font-size: 13px; color: #999; margin: 0 0 28px; }
    input {
      width: 100%;
      font-size: 30px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-align: center;
      padding: 14px 10px;
      border: 1.5px solid #e4e2dc;
      border-radius: 11px;
      outline: none;
      color: #111;
      font-family: inherit;
      background: #FAFAF8;
      margin-bottom: 14px;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #4F63D2; background: #fff; }
    button {
      width: 100%;
      padding: 13px;
      background: #4F63D2;
      color: #fff;
      border: none;
      border-radius: 11px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    button:hover { background: #3d50b8; }
    button:disabled { background: #a0aae0; cursor: default; }
    .error {
      font-size: 12.5px;
      color: #DD6B5A;
      text-align: center;
      margin-top: 12px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Vedant's Budget Tool</h1>
    <p>Enter your 6-digit authenticator code</p>
    <input id="code" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="000000" autocomplete="one-time-code" autofocus />
    <button id="btn" onclick="verify()">Verify</button>
    <div class="error" id="err"></div>
  </div>
  <script>
    const input = document.getElementById('code');
    const btn   = document.getElementById('btn');
    const err   = document.getElementById('err');

    input.addEventListener('keydown', e => { if (e.key === 'Enter') verify(); });
    input.addEventListener('input', () => { if (input.value.replace(/\D/g, '').length === 6) verify(); });

    async function verify() {
      const code = input.value.replace(/\D/g, '');
      if (code.length !== 6) return;
      err.textContent = '';
      btn.disabled = true;
      try {
        const res = await fetch('/api/auth/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code }),
        });
        if (res.ok) {
          window.location.href = '/';
        } else {
          err.textContent = 'Invalid code — try again.';
          input.value = '';
          input.focus();
        }
      } catch {
        err.textContent = 'Network error — try again.';
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
